name: Snowflake Connection Test

on:
  push:
    branches:
      - dev  # మీరు dev బ్రాంచ్‌లో పుష్ చేసినప్పుడు ఇది రన్ అవుతుంది
  workflow_dispatch: # దీనివల్ల మీరు మాన్యువల్‌గా కూడా రన్ చేయవచ్చు

jobs:
  test_connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Snowflake Connector
        run: pip install snowflake-connector-python

      - name: Test Connection Script
        env:
          SN_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SN_USER: ${{ secrets.SNOWFLAKE_USER }}
          SN_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python -c "
          import snowflake.connector
          import os
          try:
              # GitHub Secrets నుండి వివరాలు తీసుకుంటుంది
              conn = snowflake.connector.connect(
                  account=os.getenv('SN_ACCOUNT'),
                  user=os.getenv('SN_USER'),
                  password=os.getenv('SN_PASSWORD')
              )
              cursor = conn.cursor()
              cursor.execute('SELECT CURRENT_VERSION()')
              version = cursor.fetchone()
              print(f'Success: Connected to Snowflake! Version: {version[0]}')
              cursor.close()
              conn.close()
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "
